<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | NexusHub</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        body { display: flex; align-items: center; justify-content: center; min-height: 100vh; text-align: center; }
        .error-code { font-size: 8rem; font-weight: 800; background: var(--gradient-text); -webkit-background-clip: text; -webkit-text-fill-color: transparent; line-height: 1; }
        .error-message { font-size: 1.5rem; color: var(--text-secondary); margin: 20px 0; }
    </style>
</head>
<body>
    <div>
        <div class="error-code">404</div>
        <h1 class="error-message">Page Not Found</h1>
        <p style="color: var(--text-muted); margin-bottom: 32px;">The page you are looking for does not exist or has been moved.</p>
        <a href="index.html" class="btn btn-primary btn-glow">Back to Home</a>
    </div>
</body>
</html>
